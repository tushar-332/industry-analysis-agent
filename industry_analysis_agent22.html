<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Analysis Audit Agent</title>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Design tokens: light mode ── */
        :root {
            /* Brand */
            --navy:          #0a1428;
            --navy-mid:      #162040;
            --navy-light:    #1e2d52;
            --accent:        #1a56db;
            --accent-light:  #e8f0fe;
            --accent-border: #c7d8fb;

            /* Semantic colours */
            --green:         #0d6832;
            --green-mid:     #15803d;
            --green-bg:      #f0faf4;
            --green-border:  #bbf7d0;

            --amber:         #92400e;
            --amber-mid:     #b45309;
            --amber-bg:      #fffbeb;
            --amber-border:  #fde68a;

            --red:           #991b1b;
            --red-mid:       #b91c1c;
            --red-bg:        #fff5f5;
            --red-border:    #fecaca;

            --purple:        #4c1d95;
            --purple-bg:     #f5f3ff;
            --purple-border: #ddd6fe;

            /* Surface */
            --bg-page:       #f4f5f7;
            --bg-card:       #ffffff;
            --bg-subtle:     #f8f9fb;
            --bg-sunken:     #eef0f4;

            /* Text */
            --text-1:        #0d1117;
            --text-2:        #374151;
            --text-3:        #6b7280;
            --text-4:        #9ca3af;
            --text-inv:      #ffffff;

            /* Borders */
            --border-1:      #e2e5ea;
            --border-2:      #d1d5db;

            /* Geometry */
            --r-sm:  4px;
            --r-md:  8px;
            --r-lg:  12px;
            --r-xl:  16px;

            /* Type */
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

            /* Shadows */
            --shadow-xs: 0 1px 2px rgba(10,20,40,0.06);
            --shadow-sm: 0 2px 6px rgba(10,20,40,0.08), 0 1px 2px rgba(10,20,40,0.04);
            --shadow-md: 0 4px 16px rgba(10,20,40,0.10), 0 2px 4px rgba(10,20,40,0.06);

            /* Transitions */
            --tx: 180ms ease;
        }

        /* ── Dark mode ── */
        @media (prefers-color-scheme: dark) {
            :root {
                --navy:          #0f172a;
                --navy-mid:      #1e293b;
                --navy-light:    #263347;
                --accent:        #4d90f0;
                --accent-light:  #162032;
                --accent-border: #1e3a5f;

                --green:         #4ade80;
                --green-mid:     #22c55e;
                --green-bg:      #052e16;
                --green-border:  #14532d;

                --amber:         #fbbf24;
                --amber-mid:     #f59e0b;
                --amber-bg:      #1c1400;
                --amber-border:  #451a03;

                --red:           #f87171;
                --red-mid:       #ef4444;
                --red-bg:        #1c0606;
                --red-border:    #450a0a;

                --purple:        #c4b5fd;
                --purple-bg:     #150c2e;
                --purple-border: #2e1065;

                --bg-page:       #0d1117;
                --bg-card:       #161b27;
                --bg-subtle:     #1c2334;
                --bg-sunken:     #121720;

                --text-1:        #f1f5f9;
                --text-2:        #cbd5e1;
                --text-3:        #94a3b8;
                --text-4:        #64748b;
                --text-inv:      #0d1117;

                --border-1:      #242d3d;
                --border-2:      #2e3a4e;

                --shadow-xs: 0 1px 2px rgba(0,0,0,0.3);
                --shadow-sm: 0 2px 6px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0 4px 16px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            }
        }

        /* ── Base ── */
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font); background: var(--bg-page); color: var(--text-1); line-height: 1.6; font-size: 14px; }

        /* ── Layout ── */
        #app { min-height: 100vh; padding: 24px 20px 48px; }
        .container { max-width: 1240px; margin: 0 auto; }

        /* ─────────────────────────────────────────────────
           HEADER
        ───────────────────────────────────────────────── */
        .header {
            background: var(--navy);
            border-radius: var(--r-xl);
            padding: 28px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-inv);
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .header p {
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.01em;
        }
        .header-badge {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--r-md);
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
        }

        /* ─────────────────────────────────────────────────
           SEARCH PANEL
        ───────────────────────────────────────────────── */
        .search-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-xs);
        }
        .search-section {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 12px;
            align-items: flex-end;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-3);
            margin-bottom: 7px;
        }
        input[type="text"] {
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border-2);
            border-radius: var(--r-md);
            background: var(--bg-subtle);
            color: var(--text-1);
            font-family: var(--font);
            transition: border-color var(--tx), box-shadow var(--tx);
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
            background: var(--bg-card);
        }
        input[type="text"]::placeholder { color: var(--text-4); }

        /* ─────────────────────────────────────────────────
           BUTTONS
        ───────────────────────────────────────────────── */
        .button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--r-md);
            cursor: pointer;
            transition: all var(--tx);
            border: 1px solid transparent;
            font-family: var(--font);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .button-primary {
            background: var(--navy);
            color: var(--text-inv);
            border-color: var(--navy);
            box-shadow: var(--shadow-xs);
        }
        .button-primary:hover:not(:disabled) {
            background: var(--navy-light);
            border-color: var(--navy-light);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }
        .button-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .button-secondary {
            background: var(--bg-card);
            color: var(--text-2);
            border-color: var(--border-2);
            box-shadow: var(--shadow-xs);
        }
        .button-secondary:hover:not(:disabled) {
            background: var(--bg-subtle);
            border-color: var(--border-1);
            color: var(--text-1);
        }

        /* ─────────────────────────────────────────────────
           ERROR
        ───────────────────────────────────────────────── */
        .error-message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 18px;
            background: var(--red-bg);
            color: var(--red);
            border-radius: var(--r-lg);
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid var(--red-border);
            font-weight: 500;
        }

        /* ─────────────────────────────────────────────────
           META BAR
        ───────────────────────────────────────────────── */
        .meta-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .meta-info { font-size: 13px; color: var(--text-3); }
        .meta-info strong { color: var(--text-1); font-weight: 600; }
        .export-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ─────────────────────────────────────────────────
           TABS
        ───────────────────────────────────────────────── */
        .tab-navigation {
            display: flex;
            gap: 2px;
            background: var(--bg-sunken);
            border: 1px solid var(--border-1);
            border-radius: var(--r-lg);
            padding: 4px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-navigation::-webkit-scrollbar { display: none; }
        .tab-button {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            color: var(--text-3);
            border: none;
            cursor: pointer;
            white-space: nowrap;
            border-radius: var(--r-md);
            font-family: var(--font);
            transition: all var(--tx);
            letter-spacing: 0.01em;
        }
        .tab-button:hover { color: var(--text-1); background: rgba(255,255,255,0.5); }
        .tab-button.active {
            color: var(--navy);
            font-weight: 700;
            background: var(--bg-card);
            box-shadow: var(--shadow-xs);
        }
        @media (prefers-color-scheme: dark) {
            .tab-button.active { color: var(--text-1); }
            .tab-button:hover { background: rgba(255,255,255,0.06); }
        }

        /* ─────────────────────────────────────────────────
           LOADING / EMPTY
        ───────────────────────────────────────────────── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-3);
        }
        .spinner {
            display: inline-block;
            width: 15px; height: 15px;
            border: 2px solid var(--border-2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.75s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state .status { font-size: 14px; font-weight: 600; color: var(--text-2); }
        .loading-state .details { margin-top: 10px; font-size: 12px; color: var(--text-4); }
        .empty-state-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p:first-of-type { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
        .empty-state p:last-of-type { font-size: 13px; color: var(--text-4); max-width: 520px; margin: 0 auto; line-height: 1.7; }

        /* ─────────────────────────────────────────────────
           BASE CARD
        ───────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-xs);
            transition: box-shadow var(--tx);
        }
        .card:hover { box-shadow: var(--shadow-sm); }
        .card-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-3);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-1);
        }
        .card-body { font-size: 14px; color: var(--text-2); line-height: 1.75; }

        /* ─────────────────────────────────────────────────
           SCORE BADGES — green 8-10, amber 4-7, red 1-3
        ───────────────────────────────────────────────── */
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px; height: 38px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }
        .score-high   { background: var(--green-bg);  color: var(--green);  border: 1.5px solid var(--green-border); }
        .score-mid    { background: var(--amber-bg);  color: var(--amber);  border: 1.5px solid var(--amber-border); }
        .score-low    { background: var(--red-bg);    color: var(--red);    border: 1.5px solid var(--red-border);   }

        /* ─────────────────────────────────────────────────
           PORTER'S 5 FORCES
        ───────────────────────────────────────────────── */
        .force-row {
            display: grid;
            grid-template-columns: 38px 1fr;
            gap: 16px;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-1);
            transition: background var(--tx);
        }
        .force-row:last-child { border-bottom: none; padding-bottom: 0; }
        .force-row:hover { background: var(--bg-subtle); margin: 0 -24px; padding-left: 24px; padding-right: 24px; border-radius: var(--r-md); }

        .force-label { font-size: 13px; font-weight: 700; color: var(--text-1); margin-bottom: 5px; letter-spacing: -0.1px; }
        .force-bar-wrap { height: 5px; background: var(--bg-sunken); border-radius: 3px; margin-bottom: 7px; overflow: hidden; }
        .force-bar { height: 100%; border-radius: 3px; transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .force-narrative { font-size: 13px; color: var(--text-3); line-height: 1.65; }

        .attractiveness-banner {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            border-radius: var(--r-xl);
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        .attractiveness-banner .big-score { font-size: 40px; font-weight: 800; color: #fff; letter-spacing: -1px; }
        .attractiveness-banner .label { font-size: 12px; color: rgba(255,255,255,0.6); }
        .attractiveness-banner .label strong { display: block; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }

        /* ─────────────────────────────────────────────────
           PESTEL
        ───────────────────────────────────────────────── */
        .pestel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .pestel-card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 20px;
            box-shadow: var(--shadow-xs);
            transition: box-shadow var(--tx), transform var(--tx);
        }
        .pestel-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-2px); }
        .pestel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .pestel-letter {
            width: 34px; height: 34px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
        }
        .impact-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            padding: 3px 9px;
            border-radius: 20px;
        }
        .impact-positive { background: var(--green-bg);  color: var(--green-mid); border: 1px solid var(--green-border); }
        .impact-negative { background: var(--red-bg);    color: var(--red-mid);   border: 1px solid var(--red-border);   }
        .impact-neutral  { background: var(--bg-sunken); color: var(--text-3);    border: 1px solid var(--border-1);     }
        .pestel-name { font-size: 13px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
        .pestel-factors { font-size: 11px; color: var(--text-4); margin-bottom: 8px; font-style: italic; line-height: 1.5; }
        .pestel-narrative { font-size: 13px; color: var(--text-2); line-height: 1.65; }

        /* ─────────────────────────────────────────────────
           SWOT — 2×2 grid
        ───────────────────────────────────────────────── */
        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            background: var(--border-1);
            border-radius: var(--r-xl);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .swot-quadrant { padding: 22px 24px; }
        .swot-s { background: var(--green-bg); }
        .swot-w { background: var(--red-bg); }
        .swot-o { background: var(--accent-light); }
        .swot-t { background: var(--amber-bg); }
        .swot-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 14px;
        }
        .swot-label-icon { font-size: 14px; }
        .swot-s .swot-label { color: var(--green); }
        .swot-w .swot-label { color: var(--red-mid); }
        .swot-o .swot-label { color: var(--accent); }
        .swot-t .swot-label { color: var(--amber-mid); }
        .swot-list { list-style: none; }
        .swot-list li {
            font-size: 13px;
            color: var(--text-2);
            padding: 5px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            line-height: 1.55;
            display: flex;
            gap: 8px;
        }
        @media (prefers-color-scheme: dark) {
            .swot-list li { border-bottom-color: rgba(255,255,255,0.05); }
        }
        .swot-list li:last-child { border-bottom: none; }
        .swot-list li::before { content: "—"; opacity: 0.35; flex-shrink: 0; margin-top: 1px; }

        /* ─────────────────────────────────────────────────
           VALUE CHAIN — 5-segment flow
        ───────────────────────────────────────────────── */
        .chain-flow {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0;
            margin-bottom: 24px;
            border-radius: var(--r-xl);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-1);
        }
        .chain-step {
            padding: 16px 14px;
            background: var(--bg-card);
            text-align: center;
            position: relative;
            border-right: 1px solid var(--border-1);
            transition: background var(--tx);
        }
        .chain-step:last-child { border-right: none; }
        .chain-step:hover { background: var(--bg-subtle); }
        .chain-step::after {
            content: '';
            position: absolute;
            right: -10px; top: 50%;
            transform: translateY(-50%);
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 10px solid var(--border-1);
            z-index: 2;
        }
        .chain-step:last-child::after { display: none; }
        .chain-step-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-3);
            margin-bottom: 6px;
        }
        .chain-step-margin { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; font-weight: 600; }
        .margin-high     { background: var(--green-bg);  color: var(--green);      border: 1px solid var(--green-border); }
        .margin-medium   { background: var(--amber-bg);  color: var(--amber-mid);  border: 1px solid var(--amber-border); }
        .margin-low      { background: var(--red-bg);    color: var(--red-mid);    border: 1px solid var(--red-border);   }
        .margin-variable { background: var(--purple-bg); color: var(--purple);     border: 1px solid var(--purple-border);}

        .chain-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
        .chain-card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 18px;
            box-shadow: var(--shadow-xs);
        }
        .chain-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .chain-card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); }
        .moat-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .moat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .moat-high   { background: var(--green-bg);  color: var(--green);     border: 1px solid var(--green-border); }
        .moat-medium { background: var(--amber-bg);  color: var(--amber-mid); border: 1px solid var(--amber-border); }
        .moat-low    { background: var(--red-bg);    color: var(--red-mid);   border: 1px solid var(--red-border);   }
        .moat-high .moat-dot   { background: var(--green);     }
        .moat-medium .moat-dot { background: var(--amber-mid); }
        .moat-low .moat-dot    { background: var(--red-mid);   }

        /* ─────────────────────────────────────────────────
           MOAT ASSESSMENT
        ───────────────────────────────────────────────── */
        .moat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-bottom: 16px; }
        .moat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 18px;
            box-shadow: var(--shadow-xs);
            transition: box-shadow var(--tx);
        }
        .moat-card:hover { box-shadow: var(--shadow-sm); }
        .moat-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
        .moat-card-title { font-size: 13px; font-weight: 700; color: var(--text-1); }
        .overall-moat {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 24px 28px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-md);
        }
        .overall-moat .big-score { font-size: 44px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
        .overall-moat .label { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.6; }
        .overall-moat .label strong { display: block; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }

        /* ─────────────────────────────────────────────────
           UNIT ECONOMICS
        ───────────────────────────────────────────────── */
        .econ-hero { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 16px; }
        .econ-stat {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-xs);
            position: relative;
            overflow: hidden;
        }
        .econ-stat::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--navy), var(--accent));
        }
        .econ-stat-value { font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 5px; letter-spacing: -0.5px; }
        @media (prefers-color-scheme: dark) { .econ-stat-value { color: var(--accent); } }
        .econ-stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

        .econ-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .econ-table th {
            background: var(--bg-sunken);
            padding: 10px 14px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--border-2);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-3);
        }
        .econ-table td { padding: 11px 14px; border-bottom: 1px solid var(--border-1); color: var(--text-1); }
        .econ-table tr:last-child td { border-bottom: none; }
        .econ-table tr:hover td { background: var(--bg-subtle); }

        .sensitivity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-1);
        }
        .sensitivity-row:last-child { border-bottom: none; }
        .sensitivity-label { font-size: 13px; color: var(--text-2); flex: 1; }
        .sensitivity-impact { font-size: 13px; font-weight: 700; color: var(--red-mid); }

        /* ─────────────────────────────────────────────────
           REGULATORY
        ───────────────────────────────────────────────── */
        .reg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; margin-bottom: 16px; }
        .reg-card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-xl);
            padding: 20px;
            box-shadow: var(--shadow-xs);
        }
        .timeline-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 3px 9px; border-radius: 20px; }
        .timeline-active   { background: var(--red-bg);   color: var(--red-mid);   border: 1px solid var(--red-border);   }
        .timeline-proposed { background: var(--amber-bg); color: var(--amber-mid); border: 1px solid var(--amber-border); }
        .timeline-future   { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
        .legislation-list { list-style: none; }
        .legislation-list li {
            display: flex;
            gap: 10px;
            padding: 11px 0;
            border-bottom: 1px solid var(--border-1);
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6;
            align-items: flex-start;
        }
        .legislation-list li:last-child { border-bottom: none; }
        .legislation-list li::before { content: "§"; font-weight: 700; color: var(--text-4); flex-shrink: 0; }

        /* ─────────────────────────────────────────────────
           RED FLAGS
        ───────────────────────────────────────────────── */
        .red-flags-list { list-style: none; }
        .red-flag-item {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-1);
            align-items: flex-start;
        }
        .red-flag-item:last-child { border-bottom: none; }
        .flag-number {
            width: 28px; height: 28px;
            border-radius: var(--r-md);
            background: var(--red-bg);
            color: var(--red-mid);
            border: 1px solid var(--red-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .flag-text { font-size: 13px; color: var(--text-2); line-height: 1.7; padding-top: 3px; }

        /* ─────────────────────────────────────────────────
           INVESTMENT THESIS
        ───────────────────────────────────────────────── */
        .thesis-headline {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-inv);
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            border-radius: var(--r-xl);
            margin-bottom: 16px;
            line-height: 1.55;
            box-shadow: var(--shadow-sm);
            letter-spacing: -0.1px;
        }
        .scenarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
        .scenario-card { border-radius: var(--r-xl); padding: 20px; }
        .scenario-base { background: var(--bg-subtle);    border: 1px solid var(--border-2); }
        .scenario-bull { background: var(--green-bg);     border: 1px solid var(--green-border); }
        .scenario-bear { background: var(--red-bg);       border: 1px solid var(--red-border); }
        .scenario-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; }
        .scenario-base .scenario-label { color: var(--text-3); }
        .scenario-bull .scenario-label { color: var(--green); }
        .scenario-bear .scenario-label { color: var(--red-mid); }
        .scenario-text { font-size: 13px; color: var(--text-2); margin-bottom: 12px; line-height: 1.6; }
        .scenario-items { list-style: none; }
        .scenario-items li { font-size: 12px; color: var(--text-2); padding: 3px 0; display: flex; gap: 6px; }
        .scenario-items li::before { content: "→"; color: var(--text-4); flex-shrink: 0; }
        .metrics-list { list-style: none; }
        .metrics-list li {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-1);
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6;
            align-items: flex-start;
        }
        .metrics-list li:last-child { border-bottom: none; }
        .metrics-list li::before { content: "◆"; font-size: 8px; color: var(--accent); flex-shrink: 0; margin-top: 5px; }

        /* ─────────────────────────────────────────────────
           CIRCULARITY
        ───────────────────────────────────────────────── */
        .gap-bar-wrap {
            height: 28px;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: var(--r-md);
            overflow: hidden;
            margin: 14px 0;
            position: relative;
        }
        .gap-bar-circular {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--green-mid));
            border-radius: var(--r-md) 0 0 var(--r-md);
            display: flex;
            align-items: center;
            padding-left: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gap-bar-label { font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
        .barrier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 16px; }
        .barrier-card {
            background: var(--bg-card);
            border: 1px solid var(--border-1);
            border-radius: var(--r-lg);
            padding: 16px;
            box-shadow: var(--shadow-xs);
        }
        .barrier-type {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-4);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .barrier-text { font-size: 12px; color: var(--text-2); line-height: 1.65; }

        /* ─────────────────────────────────────────────────
           EXECUTIVE SUMMARY
        ───────────────────────────────────────────────── */
        .exec-summary-text {
            font-size: 15px;
            color: var(--text-1);
            line-height: 1.85;
            padding: 24px 28px;
            background: var(--bg-card);
            border-radius: var(--r-xl);
            border-left: 4px solid var(--navy);
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            font-weight: 400;
            letter-spacing: 0.01em;
        }
        .data-quality-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            padding: 4px 12px;
            border: 1px solid var(--border-2);
            border-radius: 20px;
            background: var(--bg-card);
            letter-spacing: 0.02em;
        }

        /* ─────────────────────────────────────────────────
           RESPONSIVE
        ───────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .scenarios-grid { grid-template-columns: 1fr; }
            .chain-flow { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .search-section { grid-template-columns: 1fr; }
            .swot-grid { grid-template-columns: 1fr; }
            .barrier-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .chain-flow { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 22px; }
            #app { padding: 16px; }
            .card { padding: 18px; }
        }
        @media (max-width: 480px) {
            .chain-flow { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
class IndustryAnalysisAgent {
    constructor() {
        this.searchInput = '';
        this.isLoading = false;
        this.analysisResult = null;
        this.activeTab = 'overview';
        this.error = null;

        this.tabs = [
            { id: 'overview',    label: 'Executive Summary' },
            { id: 'forces',      label: "Porter's 5 Forces" },
            { id: 'pestel',      label: 'PESTEL' },
            { id: 'circularity', label: 'Circularity Gap' },
            { id: 'swot',        label: 'SWOT' },
            { id: 'value_chain', label: 'Value Chain' },
            { id: 'moat',        label: 'Moat Assessment' },
            { id: 'economics',   label: 'Unit Economics' },
            { id: 'regulatory',  label: 'Regulatory & ESG' },
            { id: 'red_flags',   label: 'Red Flags' },
            { id: 'thesis',      label: 'Investment Thesis' },
        ];

        this.init();
    }

    init() { this.render(); }

    setupEventListeners() {
        const searchInput = document.getElementById('searchInput');
        const runButton   = document.getElementById('runButton');
        const presentBtn  = document.getElementById('presentButton');
        const exportMd    = document.getElementById('exportMd');
        const exportJson  = document.getElementById('exportJson');

        if (searchInput) {
            searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') this.runAudit(); });
            searchInput.addEventListener('input', e => { this.searchInput = e.target.value; });
        }
        if (runButton)   runButton.addEventListener('click', () => this.runAudit());
        if (presentBtn)  presentBtn.addEventListener('click', () => this.generatePresentation());
        if (exportMd)    exportMd.addEventListener('click', () => this.exportMarkdown());
        if (exportJson)  exportJson.addEventListener('click', () => this.exportJson());

        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', e => this.setActiveTab(e.currentTarget.dataset.tab));
        });
    }

    // ── API call ─────────────────────────────────────────────────────────────
    async runAudit() {
        if (!this.searchInput.trim()) {
            this.error = 'Please enter a company name or sub-sector.';
            this.render(); return;
        }
        this.isLoading = true; this.error = null; this.analysisResult = null;
        this.render();

        try {
            const res = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ company_name: this.searchInput.trim() }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `API error: ${res.status}`);
            }

            const data = await res.json();
            this.analysisResult = {
                target:    this.searchInput.trim(),
                analysis:  data.analysis,
                metadata:  data.metadata,
                timestamp: new Date().toLocaleString(),
            };
            this.activeTab = 'overview';
        } catch (err) {
            this.error = err.message || 'Failed to run analysis. Please try again.';
            console.error('Analysis error:', err);
        } finally {
            this.isLoading = false;
            this.render();
        }
    }

    // ── Exports ──────────────────────────────────────────────────────────────
    exportJson() {
        if (!this.analysisResult) return;
        const blob = new Blob([JSON.stringify(this.analysisResult.analysis, null, 2)], { type: 'application/json' });
        this.downloadBlob(blob, `${this.sanitizeFilename(this.analysisResult.target)}_analysis.json`);
    }

    exportMarkdown() {
        if (!this.analysisResult) return;
        const a = this.analysisResult.analysis;
        const md = this.buildMarkdown(a);
        const blob = new Blob([md], { type: 'text/markdown' });
        this.downloadBlob(blob, `${this.sanitizeFilename(this.analysisResult.target)}_analysis.md`);
    }

    downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }

    sanitizeFilename(name) {
        return name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    }

    buildMarkdown(a) {
        const lines = [];
        const h1 = t => lines.push(`# ${t}`, '');
        const h2 = t => lines.push(`## ${t}`, '');
        const h3 = t => lines.push(`### ${t}`, '');
        const p  = t => lines.push(t, '');
        const li = t => lines.push(`- ${t}`);
        const nl = () => lines.push('');

        h1(`Industry Analysis: ${a.metadata?.target || 'Unknown'}`);
        p(`*Generated: ${a.metadata?.analysis_date || new Date().toLocaleDateString()} | Data quality: ${a.metadata?.data_quality || 'N/A'}*`);

        h2('Executive Summary');
        p(a.executive_summary || '');

        h2("Porter's Five Forces");
        const forces = a.porters_five_forces || {};
        ['supplier_power','buyer_power','threat_of_substitutes','threat_of_new_entrants','competitive_rivalry'].forEach(k => {
            const f = forces[k] || {};
            h3(`${k.replace(/_/g,' ')} (${f.score || '-'}/10)`);
            p(f.narrative || '');
        });
        p(`**Industry Attractiveness Score:** ${forces.industry_attractiveness_score || '-'}/10`);

        h2('PESTEL');
        const pestel = a.pestel || {};
        ['political','economic','social','technological','environmental','legal'].forEach(k => {
            const item = pestel[k] || {};
            h3(`${k.charAt(0).toUpperCase() + k.slice(1)} — ${item.impact || ''}`);
            p(`*Factors: ${item.key_factors || ''}*`);
            p(item.narrative || '');
        });

        h2('Circularity Gap Analysis');
        const c = a.circularity_gap_analysis || {};
        p(c.current_state || '');
        p(`**Gap:** ${c.gap_percentage || ''}`);
        p(`**Upside Scenario:** ${c.upside_scenario || ''}`);
        p(c.narrative || '');

        h2('SWOT');
        const s = a.swot || {};
        h3('Strengths'); (s.strengths || []).forEach(li); nl();
        h3('Weaknesses'); (s.weaknesses || []).forEach(li); nl();
        h3('Opportunities'); (s.opportunities || []).forEach(li); nl();
        h3('Threats'); (s.threats || []).forEach(li); nl();

        h2('Value Chain');
        const vc = a.value_chain_analysis || {};
        Object.entries(vc).forEach(([k, v]) => {
            if (typeof v === 'object') {
                h3(k.replace(/_/g,' ')); p(v.narrative || '');
            }
        });

        h2('Moat Assessment');
        const m = a.moat_assessment || {};
        ['permits_and_licensing','route_density_and_customer_stickiness','scale_and_unit_economics',
         'capital_requirements','regulatory_and_environmental_compliance','brand_and_relationships'].forEach(k => {
            const item = m[k] || {};
            h3(`${k.replace(/_/g,' ')} (${item.score || '-'}/10)`);
            p(item.narrative || '');
        });
        p(`**Overall Moat Strength:** ${m.overall_moat_strength || '-'}/10`);
        p(m.moat_narrative || '');

        h2('Unit Economics');
        const ue = a.unit_economics || {};
        p(`**EBITDA Margin:** ${ue.typical_ebitda_margin_percent || ''}`);
        p(`**Revenue/ton Hauling:** ${ue.revenue_per_ton_hauling || ''}`);
        p(`**Revenue/ton Disposal:** ${ue.revenue_per_ton_disposal || ''}`);
        h3('Margin Drivers'); (ue.margin_drivers_ranked_by_impact || []).forEach(li); nl();
        p(ue.narrative || '');

        h2('Regulatory & ESG');
        const reg = a.regulatory_and_esg_friction || {};
        const cm = reg.carbon_and_methane_liabilities || {};
        h3('Carbon & Methane Liabilities');
        p(cm.narrative || '');
        h3('Upcoming Legislation');
        (reg.upcoming_legislation || []).forEach(li); nl();
        p(reg.narrative || '');

        h2('Red Flags');
        (a.red_flags || []).forEach(li); nl();

        h2('Investment Thesis');
        const t = a.investment_thesis || {};
        p(`**${t.headline || ''}**`);
        h3('Base Case'); p((t.base_case || {}).scenario || '');
        h3('Bull Case'); p((t.bull_case || {}).scenario || '');
        h3('Bear Case'); p((t.bear_case || {}).scenario || '');
        h3('Key Metrics to Monitor'); (t.key_metrics_to_monitor || []).forEach(li);

        return lines.join('\n');
    }

    generatePresentation() {
        if (!this.analysisResult) { this.error = 'Please run an audit first.'; this.render(); return; }
        const content = `Based on this industry analysis for ${this.analysisResult.target}:

${JSON.stringify(this.analysisResult.analysis, null, 2)}

Create a concise Gamma presentation with:
- 7-9 slides
- 1-2 executive-ready bullet points per slide
- Key data points formatted visually
- Focus on executive summary, Porter's Forces, SWOT, moat score, unit economics, red flags, and investment thesis`;
        navigator.clipboard.writeText(content)
            .then(() => alert('Copied to clipboard. Paste into Gamma or your presentation tool.'))
            .catch(() => alert('Could not access clipboard — please copy manually.'));
    }

    // ── Render helpers ────────────────────────────────────────────────────────
    scoreClass(n) {
        if (n >= 7) return 'score-high';
        if (n >= 4) return 'score-mid';
        return 'score-low';
    }

    scoreBarColor(n) {
        if (n >= 7) return 'var(--green)';
        if (n >= 4) return 'var(--orange)';
        return 'var(--red)';
    }

    marginClass(m) {
        const v = (m || '').toLowerCase();
        if (v.includes('high')) return 'margin-high';
        if (v.includes('medium') || v.includes('med')) return 'margin-medium';
        if (v.includes('low')) return 'margin-low';
        return 'margin-variable';
    }

    impactClass(impact) {
        const v = (impact || '').toLowerCase();
        if (v === 'positive') return 'impact-positive';
        if (v === 'negative') return 'impact-negative';
        return 'impact-neutral';
    }

    timelineClass(t) {
        const v = (t || '').toLowerCase();
        if (v.includes('active')) return 'timeline-active';
        if (v.includes('proposed')) return 'timeline-proposed';
        return 'timeline-future';
    }

    moatClass(m) {
        const v = (m || '').toLowerCase();
        if (v === 'high') return 'moat-high';
        if (v === 'medium') return 'moat-medium';
        return 'moat-low';
    }

    formatKey(k) {
        return k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    // ── Framework render methods ──────────────────────────────────────────────

    renderOverview(a) {
        const meta = a.metadata || {};
        const dq = meta.data_quality || '';
        return `
            <div class="exec-summary-text">${a.executive_summary || 'No summary available.'}</div>
            <div class="card">
                <div class="card-title">Analysis Metadata</div>
                <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
                    <span class="data-quality-badge">📊 ${dq.replace(/_/g,' ')}</span>
                    <span class="data-quality-badge">🏭 ${meta.industry || 'waste_management'}</span>
                    <span class="data-quality-badge">📅 ${meta.analysis_date || ''}</span>
                </div>
            </div>`;
    }

    renderPorters(a) {
        const pf = a.porters_five_forces || {};
        const forceKeys = [
            { key: 'supplier_power',        label: 'Supplier Power' },
            { key: 'buyer_power',            label: 'Buyer Power' },
            { key: 'threat_of_substitutes',  label: 'Threat of Substitutes' },
            { key: 'threat_of_new_entrants', label: 'New Entrant Threat' },
            { key: 'competitive_rivalry',    label: 'Competitive Rivalry' },
        ];
        const rows = forceKeys.map(({ key, label }) => {
            const f = pf[key] || {};
            const score = f.score || 0;
            const pct = (score / 10) * 100;
            return `
                <div class="force-row">
                    <div class="score-badge ${this.scoreClass(score)}">${score}</div>
                    <div class="force-content">
                        <div class="force-label">${label}</div>
                        <div class="force-bar-wrap">
                            <div class="force-bar" style="width:${pct}%;background:${this.scoreBarColor(score)};"></div>
                        </div>
                        <div class="force-narrative">${f.narrative || ''}</div>
                    </div>
                </div>`;
        }).join('');

        const aScore = pf.industry_attractiveness_score || 0;
        return `
            <div class="card">${rows}</div>
            <div class="attractiveness-banner">
                <div class="big-score">${aScore}</div>
                <div class="label">
                    <strong>Industry Attractiveness Score</strong>
                    Score out of 10 — higher = more structurally attractive for investment
                </div>
            </div>`;
    }

    renderPestel(a) {
        const pestel = a.pestel || {};
        const sections = [
            { key: 'political',     label: 'Political',     color: 'var(--amber-mid)', bg: 'var(--amber-bg)' },
            { key: 'economic',      label: 'Economic',      color: 'var(--accent)',    bg: 'var(--accent-light)' },
            { key: 'social',        label: 'Social',        color: 'var(--purple)',    bg: 'var(--purple-bg)' },
            { key: 'technological', label: 'Technological', color: 'var(--navy)',      bg: 'var(--bg-sunken)' },
            { key: 'environmental', label: 'Environmental', color: 'var(--green)',     bg: 'var(--green-bg)' },
            { key: 'legal',         label: 'Legal',         color: 'var(--red-mid)',   bg: 'var(--red-bg)' },
        ];
        const cards = sections.map(({ key, label, color, bg }) => {
            const item = pestel[key] || {};
            return `
                <div class="pestel-card">
                    <div class="pestel-header">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div class="pestel-letter" style="background:${bg};color:${color};">${label[0]}</div>
                            <span class="pestel-name">${label}</span>
                        </div>
                        <span class="impact-badge ${this.impactClass(item.impact)}">${item.impact || 'neutral'}</span>
                    </div>
                    <div class="pestel-factors">${item.key_factors || ''}</div>
                    <div class="pestel-narrative">${item.narrative || ''}</div>
                </div>`;
        }).join('');
        return `<div class="pestel-grid">${cards}</div>`;
    }

    renderCircularity(a) {
        const c = a.circularity_gap_analysis || {};
        const barriers = c.barriers || {};
        const gapStr = c.gap_percentage || '';
        const match = gapStr.match(/(\d+)/);
        const gapPct = match ? parseInt(match[1]) : 60;
        const circPct = 100 - gapPct;
        return `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Current State</div>
                <div class="card-body">${c.current_state || ''}</div>
            </div>
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Circularity vs. Landfill Split (est.)</div>
                <div class="gap-bar-wrap">
                    <div class="gap-bar-circular" style="width:${circPct}%;">
                        <span class="gap-bar-label">${circPct}% circular / recovered</span>
                    </div>
                </div>
                <div style="font-size:12px;color:var(--text-3);">Gap: ${gapStr}</div>
            </div>
            <div class="barrier-grid">
                <div class="barrier-card">
                    <div class="barrier-type">⚙ Technical Barriers</div>
                    <div class="barrier-text">${barriers.technical || ''}</div>
                </div>
                <div class="barrier-card">
                    <div class="barrier-type">💰 Economic Barriers</div>
                    <div class="barrier-text">${barriers.economic || ''}</div>
                </div>
                <div class="barrier-card">
                    <div class="barrier-type">⚖ Regulatory Barriers</div>
                    <div class="barrier-text">${barriers.regulatory || ''}</div>
                </div>
            </div>
            <div class="card" style="margin-top:14px;">
                <div class="card-title">Upside Scenario</div>
                <div class="card-body">${c.upside_scenario || ''}</div>
                <div style="margin-top:10px;font-size:12px;color:var(--text-2);">${c.narrative || ''}</div>
            </div>`;
    }

    renderSwot(a) {
        const s = a.swot || {};
        const quad = (cls, label, items) => `
            <div class="swot-quadrant ${cls}">
                <div class="swot-label">${label}</div>
                <ul class="swot-list">
                    ${(items || []).map(i => `<li>${i}</li>`).join('')}
                </ul>
            </div>`;
        return `
            <div class="swot-grid">
                ${quad('swot-s', '💪 Strengths',     s.strengths)}
                ${quad('swot-w', '⚠ Weaknesses',     s.weaknesses)}
                ${quad('swot-o', '🚀 Opportunities',  s.opportunities)}
                ${quad('swot-t', '🔥 Threats',        s.threats)}
            </div>`;
    }

    renderValueChain(a) {
        const vc = a.value_chain_analysis || {};
        const steps = [
            { key: 'collection',        label: 'Collection' },
            { key: 'transport',         label: 'Transport' },
            { key: 'sorting_processing',label: 'Sorting' },
            { key: 'disposal',          label: 'Disposal' },
            { key: 'recycling',         label: 'Recycling' },
        ];
        const stepHtml = steps.map(({ key, label }) => {
            const v = vc[key] || {};
            return `
                <div class="chain-step">
                    <div class="chain-step-label">${label}</div>
                    <span class="chain-step-margin ${this.marginClass(v.margin || v.commodity_price_sensitivity)}">${v.margin || 'variable'}</span>
                </div>`;
        }).join('');

        const cards = steps.map(({ key, label }) => {
            const v = vc[key] || {};
            const moatStr = v.moat_strength || 'low';
            return `
                <div class="chain-card">
                    <div class="chain-card-header">
                        <div class="chain-card-title">${label}</div>
                        <span class="moat-pill ${this.moatClass(moatStr)}">
                            <span class="moat-dot"></span>moat: ${moatStr}
                        </span>
                    </div>
                    <div style="font-size:12px;color:var(--text-2);line-height:1.6;">${v.narrative || ''}</div>
                </div>`;
        }).join('');

        return `
            <div class="chain-flow">${stepHtml}</div>
            <div class="chain-detail-grid">${cards}</div>`;
    }

    renderMoat(a) {
        const m = a.moat_assessment || {};
        const dimensions = [
            { key: 'permits_and_licensing',                   label: 'Permits & Licensing' },
            { key: 'route_density_and_customer_stickiness',   label: 'Route Density & Stickiness' },
            { key: 'scale_and_unit_economics',                label: 'Scale & Unit Economics' },
            { key: 'capital_requirements',                    label: 'Capital Requirements' },
            { key: 'regulatory_and_environmental_compliance', label: 'Regulatory Compliance' },
            { key: 'brand_and_relationships',                 label: 'Brand & Relationships' },
        ];
        const cards = dimensions.map(({ key, label }) => {
            const d = m[key] || {};
            const score = d.score || 0;
            return `
                <div class="moat-card">
                    <div class="moat-card-header">
                        <div class="score-badge ${this.scoreClass(score)}">${score}</div>
                        <div class="moat-card-title">${label}</div>
                    </div>
                    <div style="font-size:12px;color:var(--text-2);line-height:1.6;">${d.narrative || ''}</div>
                </div>`;
        }).join('');

        const overall = m.overall_moat_strength || 0;
        return `
            <div class="moat-grid">${cards}</div>
            <div class="overall-moat">
                <div class="big-score">${overall}</div>
                <div class="label">
                    <strong>Overall Moat Strength</strong>
                    ${m.moat_narrative || ''}
                </div>
            </div>`;
    }

    renderEconomics(a) {
        const ue = a.unit_economics || {};
        const cs = ue.cost_structure || {};
        const ls = ue.leverage_sensitivity || {};

        const stats = `
            <div class="econ-hero">
                <div class="econ-stat">
                    <div class="econ-stat-value">${ue.typical_ebitda_margin_percent || '—'}</div>
                    <div class="econ-stat-label">EBITDA Margin</div>
                </div>
                <div class="econ-stat">
                    <div class="econ-stat-value" style="font-size:16px;">${ue.revenue_per_ton_hauling || '—'}</div>
                    <div class="econ-stat-label">Revenue / ton (Hauling)</div>
                </div>
                <div class="econ-stat">
                    <div class="econ-stat-value" style="font-size:16px;">${ue.revenue_per_ton_disposal || '—'}</div>
                    <div class="econ-stat-label">Revenue / ton (Disposal)</div>
                </div>
            </div>`;

        const costRows = [
            ['Labor', cs.labor_percent_of_opex],
            ['Fuel', cs.fuel_percent_of_opex],
            ['Equipment Depreciation', cs.equipment_depreciation_percent_of_opex],
            ['Landfill Tipping Fees', cs.landfill_tipping_fees_percent_of_revenue],
            ['Other OpEx', cs.other_opex_percent],
        ].map(([label, val]) => `<tr><td>${label}</td><td>${val || '—'}</td></tr>`).join('');

        const costTable = `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Cost Structure</div>
                <table class="econ-table">
                    <thead><tr><th>Cost Component</th><th>% of OpEx / Revenue</th></tr></thead>
                    <tbody>${costRows}</tbody>
                </table>
            </div>`;

        const drivers = (ue.margin_drivers_ranked_by_impact || []).map((d, i) =>
            `<tr><td style="font-weight:600;color:var(--accent);">#${i+1}</td><td>${d}</td></tr>`
        ).join('');

        const driversTable = `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Margin Drivers (Ranked by Impact)</div>
                <table class="econ-table">
                    <thead><tr><th>Rank</th><th>Driver</th></tr></thead>
                    <tbody>${drivers}</tbody>
                </table>
            </div>`;

        const sensitivityRows = [
            { label: 'Fuel +10%',          val: ls.if_fuel_increases_10_percent },
            { label: 'Labor wages +5%',     val: ls.if_labor_wages_increase_5_percent },
            { label: 'Tipping fees +20%',   val: ls.if_tipping_fees_increase_20_percent },
        ].map(({ label, val }) => `
            <div class="sensitivity-row">
                <span class="sensitivity-label">${label}</span>
                <span class="sensitivity-impact">${val || '—'}</span>
            </div>`).join('');

        const sensitivity = `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Leverage Sensitivity</div>
                ${sensitivityRows}
            </div>`;

        const narrative = `
            <div class="card">
                <div class="card-title">Analyst Note</div>
                <div class="card-body">${ue.narrative || ''}</div>
            </div>`;

        return stats + costTable + driversTable + sensitivity + narrative;
    }

    renderRegulatory(a) {
        const reg = a.regulatory_and_esg_friction || {};
        const cm = reg.carbon_and_methane_liabilities || {};
        const esg = reg.esg_as_competitive_advantage_or_cost || {};

        const methane = `
            <div class="reg-card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                    <div style="font-size:12px;font-weight:600;color:var(--text-1);">Carbon & Methane Liabilities</div>
                    <span class="timeline-badge ${this.timelineClass(cm.regulation_timeline)}">${cm.regulation_timeline || ''}</span>
                </div>
                <div style="font-size:12px;color:var(--text-2);margin-bottom:8px;">${cm.narrative || ''}</div>
                <div style="font-size:11px;color:var(--text-3);">
                    <strong>Scope:</strong> ${cm.scope || ''}<br>
                    <strong>Est. cost impact:</strong> ${cm.estimated_cost_impact || ''}<br>
                    <strong>Hedging options:</strong> ${cm.hedging_options || ''}
                </div>
            </div>`;

        const esgCard = `
            <div class="reg-card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                    <div style="font-size:12px;font-weight:600;color:var(--text-1);">ESG: Advantage or Cost?</div>
                    <span class="impact-badge ${esg.monetizable === 'yes' ? 'impact-positive' : 'impact-negative'}">
                        ${esg.monetizable === 'yes' ? 'Monetizable' : 'Cost Center'}
                    </span>
                </div>
                <div style="font-size:12px;color:var(--text-2);">${esg.narrative || ''}</div>
            </div>`;

        const legislation = `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Upcoming Legislation</div>
                <ul class="legislation-list">
                    ${(reg.upcoming_legislation || []).map(l => `<li>${l}</li>`).join('')}
                </ul>
            </div>`;

        const capex = `
            <div class="card" style="margin-bottom:14px;">
                <div class="card-title">Compliance CapEx Estimate</div>
                <div style="font-size:20px;font-weight:700;color:var(--red-mid);margin-bottom:6px;">${reg.compliance_capex_estimate || '—'}</div>
                <div class="card-body">${reg.narrative || ''}</div>
            </div>`;

        return `<div class="reg-grid">${methane}${esgCard}</div>${legislation}${capex}`;
    }

    renderRedFlags(a) {
        const flags = a.red_flags || [];
        const items = flags.map((flag, i) => `
            <div class="red-flag-item">
                <div class="flag-number">${i + 1}</div>
                <div class="flag-text">${flag}</div>
            </div>`).join('');
        return `<div class="card"><ul class="red-flags-list">${items}</ul></div>`;
    }

    renderThesis(a) {
        const t = a.investment_thesis || {};
        const base = t.base_case || {};
        const bull = t.bull_case || {};
        const bear = t.bear_case || {};

        const headline = `<div class="thesis-headline">${t.headline || ''}</div>`;

        const trajBadge = (traj) => {
            const cls = traj === 'expansion' ? 'impact-positive' : traj === 'compression' ? 'impact-negative' : 'impact-neutral';
            return `<span class="impact-badge ${cls}">${traj || ''}</span>`;
        };

        const scenarios = `
            <div class="scenarios-grid">
                <div class="scenario-card scenario-base">
                    <div class="scenario-label">📊 Base Case ${trajBadge(base.ebitda_margin_trajectory)}</div>
                    <div class="scenario-text">${base.scenario || ''}</div>
                    <ul class="scenario-items">
                        ${(base.key_assumptions || []).map(i => `<li>${i}</li>`).join('')}
                    </ul>
                </div>
                <div class="scenario-card scenario-bull">
                    <div class="scenario-label">🚀 Bull Case — Upside: ${bull.margin_upside || ''}</div>
                    <div class="scenario-text">${bull.scenario || ''}</div>
                    <ul class="scenario-items">
                        ${(bull.key_catalysts || []).map(i => `<li>${i}</li>`).join('')}
                    </ul>
                </div>
                <div class="scenario-card scenario-bear">
                    <div class="scenario-label">⚠ Bear Case — Downside: ${bear.margin_downside || ''}</div>
                    <div class="scenario-text">${bear.scenario || ''}</div>
                    <ul class="scenario-items">
                        ${(bear.key_triggers || []).map(i => `<li>${i}</li>`).join('')}
                    </ul>
                </div>
            </div>`;

        const metrics = `
            <div class="card">
                <div class="card-title">Key Metrics to Monitor</div>
                <ul class="metrics-list">
                    ${(t.key_metrics_to_monitor || []).map(m => `<li>${m}</li>`).join('')}
                </ul>
            </div>`;

        return headline + scenarios + metrics;
    }

    // ── Tab content dispatcher ────────────────────────────────────────────────
    renderTabContent() {
        const a = this.analysisResult.analysis;
        switch (this.activeTab) {
            case 'overview':    return this.renderOverview(a);
            case 'forces':      return this.renderPorters(a);
            case 'pestel':      return this.renderPestel(a);
            case 'circularity': return this.renderCircularity(a);
            case 'swot':        return this.renderSwot(a);
            case 'value_chain': return this.renderValueChain(a);
            case 'moat':        return this.renderMoat(a);
            case 'economics':   return this.renderEconomics(a);
            case 'regulatory':  return this.renderRegulatory(a);
            case 'red_flags':   return this.renderRedFlags(a);
            case 'thesis':      return this.renderThesis(a);
            default:            return '<div class="card"><div class="card-body">Select a tab above.</div></div>';
        }
    }

    renderAnalysis() {
        const tabButtons = this.tabs.map(tab => `
            <button class="tab-button${this.activeTab === tab.id ? ' active' : ''}" data-tab="${tab.id}">
                ${tab.label}
            </button>`).join('');

        return `
            <div class="meta-bar">
                <div class="meta-info">
                    <strong>${this.escapeHtml(this.analysisResult.target)}</strong>
                    &nbsp;·&nbsp; ${this.escapeHtml(this.analysisResult.timestamp)}
                </div>
                <div class="export-buttons">
                    <button id="presentButton" class="button button-secondary">Gamma →</button>
                    <button id="exportMd" class="button button-secondary">↓ Markdown</button>
                    <button id="exportJson" class="button button-secondary">↓ JSON</button>
                </div>
            </div>
            <div class="tab-navigation">${tabButtons}</div>
            <div id="tab-content">${this.renderTabContent()}</div>`;
    }

    renderLoading() {
        return `
            <div class="loading-state">
                <div class="status"><span class="spinner"></span>Analyzing ${this.escapeHtml(this.searchInput)}…</div>
                <div class="details">Running 10-framework PE-grade audit. This may take 20–30 seconds.</div>
            </div>`;
    }

    renderEmpty() {
        return `
            <div class="empty-state">
                <div class="empty-state-icon">🏭</div>
                <p>Enter a company name or waste management sub-sector to begin.</p>
                <p>Delivers Porter's 5 Forces · PESTEL · Circularity Gap · SWOT · Value Chain · Moat · Unit Economics · Regulatory · Red Flags · Investment Thesis</p>
            </div>`;
    }

    render() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <div class="header">
                    <div>
                        <h1>Industry Analysis Audit</h1>
                        <p>Waste management economics &amp; PE investment analysis</p>
                    </div>
                    <span class="header-badge">PE Grade</span>
                </div>
                <div class="search-panel">
                    <div class="search-section">
                        <div class="form-group">
                            <label>Company or Sub-Sector</label>
                            <input id="searchInput" type="text"
                                placeholder="e.g., Waste Management Inc., Medical Waste, Recycling Operations"
                                value="${this.escapeHtml(this.searchInput)}" />
                        </div>
                        <button id="runButton" class="button button-primary" ${this.isLoading ? 'disabled' : ''}>
                            ${this.isLoading ? 'Analyzing…' : 'Run Audit'}
                        </button>
                    </div>
                </div>
                ${this.error ? `<div class="error-message">⚠ ${this.escapeHtml(this.error)}</div>` : ''}
                ${this.analysisResult ? this.renderAnalysis() : this.isLoading ? this.renderLoading() : this.renderEmpty()}
            </div>`;
        this.setupEventListeners();
    }

    setActiveTab(tabId) {
        this.activeTab = tabId;
        // Swap only the tab content and tab buttons — avoids full re-render
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        const content = document.getElementById('tab-content');
        if (content) content.innerHTML = this.renderTabContent();
        this.setupEventListeners();
    }

    escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = String(text || '');
        return d.innerHTML;
    }
}

document.addEventListener('DOMContentLoaded', () => { window.agent = new IndustryAnalysisAgent(); });
</script>
</body>
</html>
